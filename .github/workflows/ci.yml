name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: npm run check

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate Terraform configuration
        run: terraform -chdir=infra/terraform validate
