name: Deploy
run-name: ${{ format('Deploy ({0})', github.event_name == 'workflow_dispatch' && (inputs.resource_prefix || vars.RESOURCE_PREFIX || 'aws-dev-1') || (vars.RESOURCE_PREFIX || 'aws-dev-1')) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      resource_prefix:
        description: Environment/resource prefix used in names and state derivation
        required: false
        default: aws-dev-1
        type: string
      payment_failure_mode:
        description: Payment simulator failure mode
        required: false
        default: random_fail
        type: choice
        options:
          - none
          - always_fail
          - random_fail
          - slow_response
          - random_reject
      log_retention_in_days:
        description: CloudWatch log retention in days
        required: false
        default: "1"
        type: string
      instrumentation_mode:
        description: AWS Lambda instrumentation mode
        required: false
        default: code
        type: choice
        options:
          - code
          - adot_layer
      export_strategy:
        description: Telemetry export path applied to traces, metrics, and logs in the effective contract
        required: false
        default: collector
        type: choice
        options:
          - collector
          - direct
      collector_endpoint:
        description: Optional collector OTLP base endpoint
        required: false
        default: ""
        type: string
      collector_traces_endpoint:
        description: Optional collector traces endpoint override
        required: false
        default: ""
        type: string
      collector_metrics_endpoint:
        description: Optional collector metrics endpoint override
        required: false
        default: ""
        type: string

jobs:
  observability:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read
    outputs:
      validation_message: ${{ steps.contract-consumer.outputs.validation_message }}
      plan_json: ${{ steps.contract-consumer.outputs.plan_json }}
      bindings_json: ${{ steps.contract-consumer.outputs.bindings_json }}
      managed_suite_enabled: ${{ steps.contract-consumer.outputs.managed_suite_enabled }}
      managed_suite_grafana_url: ${{ steps.contract-consumer.outputs.managed_suite_grafana_url }}
      managed_suite_otlp_http_endpoint: ${{ steps.contract-consumer.outputs.managed_suite_otlp_http_endpoint }}
      workload_dashboard_backend: ${{ steps.contract-consumer.outputs.workload_dashboard_backend }}
      workload_dashboard_uid: ${{ steps.contract-consumer.outputs.workload_dashboard_uid }}
      workload_dashboard_url: ${{ steps.contract-consumer.outputs.workload_dashboard_url }}
      effective_collector_endpoint: ${{ steps.contract-consumer.outputs.effective_collector_endpoint }}
      effective_collector_source: ${{ steps.contract-consumer.outputs.effective_collector_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare effective observability contract
        env:
          SOURCE_CONTRACT_PATH: contracts/observability/order-processing.observability.yaml
          EFFECTIVE_CONTRACT_PATH: build/observability/order-processing.effective.observability.yaml
          EXPORT_STRATEGY_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.export_strategy || 'collector' }}
        run: |
          set -euo pipefail
          mkdir -p build/observability
          cp "$SOURCE_CONTRACT_PATH" "$EFFECTIVE_CONTRACT_PATH"

          python3 - <<'PY'
          import os
          from pathlib import Path

          source = Path(os.environ["EFFECTIVE_CONTRACT_PATH"])
          export_strategy = os.environ["EXPORT_STRATEGY_INPUT"].strip()
          if export_strategy not in {"collector", "direct"}:
            raise SystemExit(f"Unsupported export strategy: {export_strategy}")

          text = source.read_text()
          text = text.replace("        ingestion: collector", f"        ingestion: {export_strategy}")
          text = text.replace("        ingestion: direct", f"        ingestion: {export_strategy}")
          source.write_text(text)
          PY

      - name: Validate workflow input combination
        env:
          EXPORT_STRATEGY_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.export_strategy || 'collector' }}
          COLLECTOR_ENDPOINT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_endpoint || '' }}
          COLLECTOR_TRACES_ENDPOINT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_traces_endpoint || '' }}
          COLLECTOR_METRICS_ENDPOINT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_metrics_endpoint || '' }}
        run: |
          set -euo pipefail

          if [ "$EXPORT_STRATEGY_INPUT" = "direct" ] && { [ -n "$COLLECTOR_ENDPOINT_INPUT" ] || [ -n "$COLLECTOR_TRACES_ENDPOINT_INPUT" ] || [ -n "$COLLECTOR_METRICS_ENDPOINT_INPUT" ]; }; then
            echo "collector_* inputs cannot be combined with export_strategy=direct." >&2
            exit 1
          fi

      - name: Run contract consumer
        id: contract-consumer
        uses: pazfernando/workshop-idp-o11y/.github/actions/contract-consumer@main
        with:
          contract_path: build/observability/order-processing.effective.observability.yaml
          upload_artifacts: true
          generate_bindings: true
          bindings_target: aws-lambda
          instrumentation_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.instrumentation_mode || 'code' }}
          collector_endpoint: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_endpoint || '' }}
          collector_traces_endpoint: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_traces_endpoint || '' }}
          collector_metrics_endpoint: ${{ github.event_name == 'workflow_dispatch' && inputs.collector_metrics_endpoint || '' }}
          deploy_managed_suite: false
          reuse_managed_suite: true
          aws_region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

      - name: Fail when collector mode cannot resolve an endpoint
        env:
          BINDINGS_JSON: ${{ steps.contract-consumer.outputs.bindings_json }}
          EFFECTIVE_COLLECTOR_ENDPOINT: ${{ steps.contract-consumer.outputs.effective_collector_endpoint }}
          MANAGED_SUITE_ENABLED: ${{ steps.contract-consumer.outputs.managed_suite_enabled }}
        run: |
          set -euo pipefail
          EXPORT_STRATEGY="$(
            node -e 'const payload = JSON.parse(process.env.BINDINGS_JSON || "{}"); process.stdout.write(String(payload.instrumentation?.exportStrategy || ""));'
          )"

          if [ "$EXPORT_STRATEGY" != "collector" ]; then
            exit 0
          fi

          if [ -n "$EFFECTIVE_COLLECTOR_ENDPOINT" ]; then
            exit 0
          fi

          echo "Collector mode was requested, but no collector endpoint was resolved." >&2
          echo "This workflow now relies only on the contract-consumer composite action." >&2
          if [ "$MANAGED_SUITE_ENABLED" = "true" ]; then
            echo "Managed suite reuse was enabled, but it did not produce an OTLP endpoint." >&2
          else
            echo "No pre-existing managed Grafana suite was available to supply the collector endpoint." >&2
          fi
          echo "Provide an explicit collector URL in the platform path or ensure the managed suite already exists before running deploy." >&2
          exit 1

  deploy:
    needs:
      - observability
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      ENVIRONMENT_NAME: aws-dev
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'observability-business-case' }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix != '' && inputs.resource_prefix || vars.RESOURCE_PREFIX || 'aws-dev-1' }}
      PAYMENT_FAILURE_MODE: ${{ inputs.payment_failure_mode != '' && inputs.payment_failure_mode || vars.PAYMENT_FAILURE_MODE || 'random_fail' }}
      LOG_RETENTION_IN_DAYS: ${{ inputs.log_retention_in_days != '' && inputs.log_retention_in_days || vars.LOG_RETENTION_IN_DAYS || '7' }}
      OBSERVABILITY_CONTRACT_PATH: contracts/observability/order-processing.observability.yaml
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Persist observability workflow outputs
        run: |
          mkdir -p build/observability
          printf '%s\n' '${{ needs.observability.outputs.validation_message }}' > build/observability/validation.txt
          printf '%s\n' '${{ needs.observability.outputs.plan_json }}' > build/observability/plan.json
          printf '%s\n' '${{ needs.observability.outputs.bindings_json }}' > build/observability/bindings.json

      - name: Resolve observability bindings for Terraform consumption
        env:
          OBSERVABILITY_BINDINGS_PATH: build/observability/bindings.json
          OBSERVABILITY_TERRAFORM_VARS_PATH: build/observability/terraform.tfvars.json
        run: node scripts/resolve-observability-bindings.js

      - name: Ensure Terraform state bucket
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          PROJECT_SLUG="$(printf '%s' "$EFFECTIVE_STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          PROJECT_SLUG="${PROJECT_SLUG#-}"
          PROJECT_SLUG="${PROJECT_SLUG%-}"

          if [ -n "$TF_STATE_BUCKET" ]; then
            BUCKET_NAME="$TF_STATE_BUCKET"
          else
            BUCKET_SUFFIX="${ACCOUNT_ID}-${AWS_REGION}-tfstate"
            MAX_BUCKET_LENGTH=63
            MAX_PROJECT_SLUG_LENGTH=$((MAX_BUCKET_LENGTH - ${#BUCKET_SUFFIX} - 1))
            PROJECT_HASH="$(printf '%s' "$PROJECT_SLUG" | shasum -a 256 | cut -c1-8)"

            if [ "$MAX_PROJECT_SLUG_LENGTH" -lt 10 ]; then
              echo "Unable to derive a valid Terraform state bucket name from STACK_NAME/RESOURCE_PREFIX." >&2
              exit 1
            fi

            if [ "${#PROJECT_SLUG}" -gt "$MAX_PROJECT_SLUG_LENGTH" ]; then
              TRUNCATED_LENGTH=$((MAX_PROJECT_SLUG_LENGTH - 9))
              PROJECT_SLUG="${PROJECT_SLUG:0:$TRUNCATED_LENGTH}-${PROJECT_HASH}"
              PROJECT_SLUG="${PROJECT_SLUG%-}"
            fi

            BUCKET_NAME="${PROJECT_SLUG}-${BUCKET_SUFFIX}"
          fi

          STATE_KEY="${TF_STATE_KEY:-${ENVIRONMENT_NAME}/${EFFECTIVE_STACK_NAME}.tfstate}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Using existing Terraform state bucket: $BUCKET_NAME"
          else
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          {
            echo "TF_STATE_BUCKET=$BUCKET_NAME"
            echo "TF_STATE_KEY=$STATE_KEY"
          } >> "$GITHUB_ENV"

      - name: Initialize Terraform
        run: |
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Reconcile Terraform state
        run: |
          tf_has_state() {
            terraform -chdir=infra/terraform state show "$1" >/dev/null 2>&1
          }

          tf_import_if_missing() {
            ADDRESS="$1"
            IMPORT_ID="$2"

            if tf_has_state "$ADDRESS"; then
              echo "State already contains $ADDRESS"
              return 0
            fi

            echo "Importing $ADDRESS from $IMPORT_ID"
            if OUTPUT="$(terraform -chdir=infra/terraform import "$ADDRESS" "$IMPORT_ID" 2>&1)"; then
              printf '%s\n' "$OUTPUT"
              return 0
            fi

            printf '%s\n' "$OUTPUT"
            if printf '%s\n' "$OUTPUT" | grep -Eq "Cannot import non-existent remote object|Cannot import, resource does not exist|non-existent remote object"; then
              echo "Remote object for $ADDRESS was not found; leaving it unmanaged for this run"
              return 0
            fi

            return 1
          }

          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          CREATE_ORDER_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-create-order"
          GET_ORDER_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-get-order"
          PAYMENT_SIMULATOR_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-payment-simulator"
          ORDER_PROCESSOR_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-order-processor"
          ORDERS_TABLE_NAME="${EFFECTIVE_STACK_NAME}-orders"
          API_NAME="${EFFECTIVE_STACK_NAME}-http-api"
          EVENT_RULE_NAME="${EFFECTIVE_STACK_NAME}-order-created"
          API_ACCESS_LOG_GROUP_NAME="/aws/apigateway/${EFFECTIVE_STACK_NAME}-http-api-access"
          CREATE_ORDER_LOG_GROUP_NAME="/aws/lambda/${CREATE_ORDER_FUNCTION_NAME}"
          GET_ORDER_LOG_GROUP_NAME="/aws/lambda/${GET_ORDER_FUNCTION_NAME}"
          PAYMENT_SIMULATOR_LOG_GROUP_NAME="/aws/lambda/${PAYMENT_SIMULATOR_FUNCTION_NAME}"
          ORDER_PROCESSOR_LOG_GROUP_NAME="/aws/lambda/${ORDER_PROCESSOR_FUNCTION_NAME}"
          CREATE_ORDER_ROLE_NAME="${CREATE_ORDER_FUNCTION_NAME}-role"
          GET_ORDER_ROLE_NAME="${GET_ORDER_FUNCTION_NAME}-role"
          PAYMENT_SIMULATOR_ROLE_NAME="${PAYMENT_SIMULATOR_FUNCTION_NAME}-role"
          ORDER_PROCESSOR_ROLE_NAME="${ORDER_PROCESSOR_FUNCTION_NAME}-role"
          CREATE_ORDER_POLICY_NAME="${CREATE_ORDER_FUNCTION_NAME}-policy"
          GET_ORDER_POLICY_NAME="${GET_ORDER_FUNCTION_NAME}-policy"
          ORDER_PROCESSOR_POLICY_NAME="${ORDER_PROCESSOR_FUNCTION_NAME}-policy"
          LAMBDA_BASIC_EXECUTION_POLICY_ARN="arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

          tf_import_if_missing "aws_dynamodb_table.orders" "$ORDERS_TABLE_NAME"

          for ITEM in \
            "aws_iam_role.create_order:${CREATE_ORDER_ROLE_NAME}" \
            "aws_iam_role.get_order:${GET_ORDER_ROLE_NAME}" \
            "aws_iam_role.payment_simulator:${PAYMENT_SIMULATOR_ROLE_NAME}" \
            "aws_iam_role.order_processor:${ORDER_PROCESSOR_ROLE_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            ROLE_NAME="${ITEM#*:}"

            tf_import_if_missing "$ADDRESS" "$ROLE_NAME"
          done

          for ITEM in \
            "aws_iam_role_policy.create_order:${CREATE_ORDER_ROLE_NAME}:${CREATE_ORDER_POLICY_NAME}" \
            "aws_iam_role_policy.get_order:${GET_ORDER_ROLE_NAME}:${GET_ORDER_POLICY_NAME}" \
            "aws_iam_role_policy.order_processor:${ORDER_PROCESSOR_ROLE_NAME}:${ORDER_PROCESSOR_POLICY_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            REST="${ITEM#*:}"
            ROLE_NAME="${REST%%:*}"
            POLICY_NAME="${REST#*:}"

            tf_import_if_missing "$ADDRESS" "${ROLE_NAME}:${POLICY_NAME}"
          done

          for ITEM in \
            "aws_iam_role_policy_attachment.create_order_logs:${CREATE_ORDER_ROLE_NAME}" \
            "aws_iam_role_policy_attachment.get_order_logs:${GET_ORDER_ROLE_NAME}" \
            "aws_iam_role_policy_attachment.payment_simulator_logs:${PAYMENT_SIMULATOR_ROLE_NAME}" \
            "aws_iam_role_policy_attachment.order_processor_logs:${ORDER_PROCESSOR_ROLE_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            ROLE_NAME="${ITEM#*:}"

            tf_import_if_missing "$ADDRESS" "${ROLE_NAME}/${LAMBDA_BASIC_EXECUTION_POLICY_ARN}"
          done

          for ITEM in \
            "aws_lambda_function.create_order:${CREATE_ORDER_FUNCTION_NAME}" \
            "aws_lambda_function.get_order:${GET_ORDER_FUNCTION_NAME}" \
            "aws_lambda_function.payment_simulator:${PAYMENT_SIMULATOR_FUNCTION_NAME}" \
            "aws_lambda_function.order_processor:${ORDER_PROCESSOR_FUNCTION_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            FUNCTION_NAME="${ITEM#*:}"

            tf_import_if_missing "$ADDRESS" "$FUNCTION_NAME"
          done

          for ITEM in \
            "aws_cloudwatch_log_group.api_access:${API_ACCESS_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.create_order:${CREATE_ORDER_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.get_order:${GET_ORDER_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.payment_simulator:${PAYMENT_SIMULATOR_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.order_processor:${ORDER_PROCESSOR_LOG_GROUP_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            LOG_GROUP_NAME="${ITEM#*:}"

            tf_import_if_missing "$ADDRESS" "$LOG_GROUP_NAME"
          done

          API_ID="$(aws apigatewayv2 get-apis --query "Items[?Name=='${API_NAME}'].ApiId | [0]" --output text)"

          if [ "$API_ID" != "None" ] && [ -n "$API_ID" ]; then
            tf_import_if_missing "aws_apigatewayv2_api.orders" "$API_ID"
            tf_import_if_missing "aws_apigatewayv2_stage.default" "${API_ID}/\$default"

            CREATE_ORDER_ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteKey=='POST /orders'].RouteId | [0]" --output text)"
            GET_ORDER_ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteKey=='GET /orders/{orderId}'].RouteId | [0]" --output text)"

            if [ "$CREATE_ORDER_ROUTE_ID" != "None" ] && [ -n "$CREATE_ORDER_ROUTE_ID" ]; then
              tf_import_if_missing "aws_apigatewayv2_route.create_order" "${API_ID}/${CREATE_ORDER_ROUTE_ID}"
              CREATE_ORDER_TARGET="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteId=='${CREATE_ORDER_ROUTE_ID}'].Target | [0]" --output text)"
              CREATE_ORDER_INTEGRATION_ID="${CREATE_ORDER_TARGET#integrations/}"

              if [ -n "$CREATE_ORDER_INTEGRATION_ID" ] && [ "$CREATE_ORDER_INTEGRATION_ID" != "$CREATE_ORDER_TARGET" ]; then
                tf_import_if_missing "aws_apigatewayv2_integration.create_order" "${API_ID}/${CREATE_ORDER_INTEGRATION_ID}"
              fi
            fi

            if [ "$GET_ORDER_ROUTE_ID" != "None" ] && [ -n "$GET_ORDER_ROUTE_ID" ]; then
              tf_import_if_missing "aws_apigatewayv2_route.get_order" "${API_ID}/${GET_ORDER_ROUTE_ID}"
              GET_ORDER_TARGET="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteId=='${GET_ORDER_ROUTE_ID}'].Target | [0]" --output text)"
              GET_ORDER_INTEGRATION_ID="${GET_ORDER_TARGET#integrations/}"

              if [ -n "$GET_ORDER_INTEGRATION_ID" ] && [ "$GET_ORDER_INTEGRATION_ID" != "$GET_ORDER_TARGET" ]; then
                tf_import_if_missing "aws_apigatewayv2_integration.get_order" "${API_ID}/${GET_ORDER_INTEGRATION_ID}"
              fi
            fi
          fi

          if aws events describe-rule --name "$EVENT_RULE_NAME" >/dev/null 2>&1; then
            tf_import_if_missing "aws_cloudwatch_event_rule.order_created" "$EVENT_RULE_NAME"
          fi

          if aws lambda get-policy --function-name "$CREATE_ORDER_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowHttpApiInvokeCreateOrder'; then
            tf_import_if_missing "aws_lambda_permission.allow_api_gateway_create_order" "${CREATE_ORDER_FUNCTION_NAME}/AllowHttpApiInvokeCreateOrder"
          fi

          if aws lambda get-policy --function-name "$GET_ORDER_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowHttpApiInvokeGetOrder'; then
            tf_import_if_missing "aws_lambda_permission.allow_api_gateway_get_order" "${GET_ORDER_FUNCTION_NAME}/AllowHttpApiInvokeGetOrder"
          fi

          if aws lambda get-policy --function-name "$ORDER_PROCESSOR_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowEventBridgeInvokeOrderProcessor'; then
            tf_import_if_missing "aws_lambda_permission.allow_eventbridge_order_processor" "${ORDER_PROCESSOR_FUNCTION_NAME}/AllowEventBridgeInvokeOrderProcessor"
          fi

          if aws events list-targets-by-rule --rule "$EVENT_RULE_NAME" --query "Targets[?Id=='OrderProcessorFunction'].Id | [0]" --output text 2>/dev/null | grep -q 'OrderProcessorFunction'; then
            tf_import_if_missing "aws_cloudwatch_event_target.order_processor" "${EVENT_RULE_NAME}/OrderProcessorFunction"
          fi

          echo "Terraform state after reconciliation:"
          terraform -chdir=infra/terraform state list || true

      - name: Preview reconciled Terraform state
        run: |
          mkdir -p build/artifacts/terraform
          terraform -chdir=infra/terraform plan \
            -no-color \
            -refresh-only \
            -lock=false \
            -var-file="${GITHUB_WORKSPACE}/build/observability/terraform.tfvars.json" \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="resource_prefix=${RESOURCE_PREFIX}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}" \
            -var="log_retention_in_days=${LOG_RETENTION_IN_DAYS}" \
            2>&1 | tee build/artifacts/terraform/refresh-only-plan.log

      - name: Deploy stack
        run: |
          mkdir -p build/artifacts/terraform
          set +e
          terraform -chdir=infra/terraform apply \
            -no-color \
            -auto-approve \
            -var-file="${GITHUB_WORKSPACE}/build/observability/terraform.tfvars.json" \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="resource_prefix=${RESOURCE_PREFIX}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}" \
            -var="log_retention_in_days=${LOG_RETENTION_IN_DAYS}" \
            2>&1 | tee build/artifacts/terraform/apply.log
          TERRAFORM_APPLY_EXIT_CODE="${PIPESTATUS[0]}"
          echo "Terraform apply exit code: ${TERRAFORM_APPLY_EXIT_CODE}"
          if [ "${TERRAFORM_APPLY_EXIT_CODE}" -ne 0 ]; then
            echo "Last 200 lines from terraform apply:"
            tail -n 200 build/artifacts/terraform/apply.log || true
          fi
          exit "${TERRAFORM_APPLY_EXIT_CODE}"

      - name: Upload Terraform diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-diagnostics-${{ env.ENVIRONMENT_NAME }}-${{ github.run_id }}
          path: build/artifacts/terraform/
          if-no-files-found: warn

      - name: Build deployment profile artifact
        if: success()
        run: |
          mkdir -p build/artifacts/observability

          API_BASE_URL="$(terraform -chdir=infra/terraform output -raw api_base_url)"
          ORDERS_TABLE_NAME="$(terraform -chdir=infra/terraform output -raw orders_table_name)"
          PAYMENT_SIMULATOR_NAME="$(terraform -chdir=infra/terraform output -raw payment_simulator_name)"
          API_ACCESS_LOG_GROUP_NAME="$(terraform -chdir=infra/terraform output -raw api_access_log_group_name)"
          WORKLOAD_SERVICE_INSTANCE_ID="$(terraform -chdir=infra/terraform output -raw workload_service_instance_id)"
          OBSERVABILITY_INSTRUMENTATION_MODE="$(terraform -chdir=infra/terraform output -raw observability_instrumentation_mode || true)"
          EFFECTIVE_OTLP_BASE_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_base_endpoint || true)"
          EFFECTIVE_OTLP_TRACES_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_traces_endpoint || true)"
          EFFECTIVE_OTLP_METRICS_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_metrics_endpoint || true)"
          EFFECTIVE_OTLP_AUTHENTICATION_MODE="$(terraform -chdir=infra/terraform output -raw effective_otlp_authentication_mode || true)"
          EFFECTIVE_LAMBDA_EXEC_WRAPPER="$(terraform -chdir=infra/terraform output -raw effective_lambda_exec_wrapper || true)"
          EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="$(terraform -chdir=infra/terraform output -raw effective_adot_lambda_layer_arn || true)"
          OTLP_EXPORT_STATUS="$(terraform -chdir=infra/terraform output -raw otlp_export_status || true)"
          APPLICATION_SIGNALS_EXECUTION_ROLE_POLICY_ENABLED="$(terraform -chdir=infra/terraform output -raw application_signals_execution_role_policy_enabled || true)"

          cp build/observability/validation.txt build/artifacts/observability/validation.txt
          cp build/observability/plan.json build/artifacts/observability/plan.json
          cp build/observability/bindings.json build/artifacts/observability/bindings.json

          cat > build/artifacts/deployment-profile.md <<EOF
          # Deployment Profile

          Generated by \`.github/workflows/deploy.yml\` for run \`${GITHUB_RUN_ID}\`.

          ## Deployment Context

          | Field | Value |
          | :--- | :--- |
          | Environment | \`${ENVIRONMENT_NAME}\` |
          | AWS Region | \`${AWS_REGION}\` |
          | Stack Name | \`${STACK_NAME}\` |
          | Resource Prefix | \`${RESOURCE_PREFIX}\` |
          | Git Branch | \`${GITHUB_REF_NAME}\` |
          | Git Commit | \`${GITHUB_SHA}\` |
          | API Base URL | \`${API_BASE_URL}\` |
          | Orders Table | \`${ORDERS_TABLE_NAME}\` |
          | Payment Simulator Lambda | \`${PAYMENT_SIMULATOR_NAME}\` |
          | API Access Log Group | \`${API_ACCESS_LOG_GROUP_NAME}\` |
          | OTEL service.instance.id | \`${WORKLOAD_SERVICE_INSTANCE_ID}\` |
          | Observability Contract | \`${OBSERVABILITY_CONTRACT_PATH}\` |

          ## Observability Workflow Outputs

          | Field | Value |
          | :--- | :--- |
          | Validation message | \`${{ needs.observability.outputs.validation_message }}\` |
          | Managed suite enabled | \`${{ needs.observability.outputs.managed_suite_enabled }}\` |
          | Managed suite Grafana URL | \`${{ needs.observability.outputs.managed_suite_grafana_url }}\` |
          | Workload dashboard backend | \`${{ needs.observability.outputs.workload_dashboard_backend }}\` |
          | Workload dashboard UID | \`${{ needs.observability.outputs.workload_dashboard_uid }}\` |
          | Workload dashboard URL | \`${{ needs.observability.outputs.workload_dashboard_url }}\` |
          | Managed suite OTLP HTTP endpoint | \`${{ needs.observability.outputs.managed_suite_otlp_http_endpoint }}\` |
          | Effective collector endpoint | \`${{ needs.observability.outputs.effective_collector_endpoint }}\` |
          | Effective collector source | \`${{ needs.observability.outputs.effective_collector_source }}\` |

          ## Effective Runtime Bindings

          | Setting | Effective Value |
          | :--- | :--- |
          | Instrumentation mode | \`${OBSERVABILITY_INSTRUMENTATION_MODE}\` |
          | OTLP export status | \`${OTLP_EXPORT_STATUS}\` |
          | OTLP backend auth requirement | \`${EFFECTIVE_OTLP_AUTHENTICATION_MODE}\` |
          | AWS_LAMBDA_EXEC_WRAPPER | \`${EFFECTIVE_LAMBDA_EXEC_WRAPPER}\` |
          | Application Signals execution role policy | \`${APPLICATION_SIGNALS_EXECUTION_ROLE_POLICY_ENABLED}\` |
          | Effective ADOT Lambda Layer ARN | \`${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}\` |
          | Effective OTLP base endpoint | \`${EFFECTIVE_OTLP_BASE_ENDPOINT}\` |
          | Effective OTLP traces endpoint | \`${EFFECTIVE_OTLP_TRACES_ENDPOINT}\` |
          | Effective OTLP metrics endpoint | \`${EFFECTIVE_OTLP_METRICS_ENDPOINT}\` |

          ## Collected Business Metrics

          | Metric | Type | Unit | Meaning |
          | :--- | :--- | :--- | :--- |
          | \`HttpServerRequestCount\` | \`counter\` | \`{request}\` | Total HTTP requests handled by the serverless API. |
          | \`HttpServerRequestDuration\` | \`histogram\` | \`ms\` | End-to-end HTTP request latency for the serverless API. Percentiles such as \`p95\` and \`p99\` are derived downstream from this histogram. |
          | \`HttpServerRequestErrors\` | \`counter\` | \`{error}\` | HTTP requests that completed with server-side failure conditions. |
          | \`AsyncOperationCount\` | \`counter\` | \`{operation}\` | Total async worker operations handled by the serverless workflow. |
          | \`AsyncOperationDuration\` | \`histogram\` | \`ms\` | End-to-end latency for async worker operations. Percentiles such as \`p95\` and \`p99\` are derived downstream from this histogram. |
          | \`AsyncOperationErrors\` | \`counter\` | \`{error}\` | Async worker operations that completed with failures. |

          ## Notes

          - This repository consumes the observability platform through the composite action interface.
          - The workflow can select \`code\` or \`adot_layer\`, and can generate an effective \`collector\` or \`direct\` contract for the current run.
          - When collector mode does not receive an explicit endpoint, the standard path reuses a pre-existing managed suite OTLP endpoint.
          - If collector mode is requested and the platform cannot resolve an explicit collector URL or a pre-existing managed suite endpoint, the workflow fails before Terraform apply.
          - The deploy job persists validation, plan, and bindings payloads from the platform workflow before applying Terraform.
          - Terraform injects the generated AWS Lambda bindings into every application Lambda in this stack, while workload dashboards are materialized only by the platform workflow.
          EOF

      - name: Upload deployment profile artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-profile-${{ env.ENVIRONMENT_NAME }}-${{ github.run_id }}
          path: build/artifacts/
          if-no-files-found: error

      - name: Show API URL
        run: terraform -chdir=infra/terraform output -raw api_base_url
