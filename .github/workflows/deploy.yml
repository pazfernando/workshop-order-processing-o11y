name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      payment_failure_mode:
        description: Payment simulator failure mode
        required: false
        default: none
        type: choice
        options:
          - none
          - always_fail
          - random_fail
          - slow_response
          - random_reject

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      ENVIRONMENT_NAME: aws-dev
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'observability-business-case' }}
      PAYMENT_FAILURE_MODE: ${{ inputs.payment_failure_mode != '' && inputs.payment_failure_mode || vars.PAYMENT_FAILURE_MODE || 'none' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Ensure Terraform state bucket
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          PROJECT_SLUG="$(printf '%s' "$STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          PROJECT_SLUG="${PROJECT_SLUG#-}"
          PROJECT_SLUG="${PROJECT_SLUG%-}"

          if [ -n "$TF_STATE_BUCKET" ]; then
            BUCKET_NAME="$TF_STATE_BUCKET"
          else
            BUCKET_NAME="${PROJECT_SLUG}-${ACCOUNT_ID}-${AWS_REGION}-tfstate"
          fi

          STATE_KEY="${TF_STATE_KEY:-${ENVIRONMENT_NAME}/${STACK_NAME}.tfstate}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Using existing Terraform state bucket: $BUCKET_NAME"
          else
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          {
            echo "TF_STATE_BUCKET=$BUCKET_NAME"
            echo "TF_STATE_KEY=$STATE_KEY"
          } >> "$GITHUB_ENV"

      - name: Initialize Terraform
        run: |
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Deploy stack
        run: |
          terraform -chdir=infra/terraform apply \
            -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}"

      - name: Show API URL
        run: terraform -chdir=infra/terraform output -raw api_base_url
