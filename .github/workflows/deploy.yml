name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      payment_failure_mode:
        description: Payment simulator failure mode
        required: false
        default: random_fail
        type: choice
        options:
          - none
          - always_fail
          - random_fail
          - slow_response
          - random_reject
      log_retention_in_days:
        description: CloudWatch log retention in days
        required: false
        default: "7"
        type: string
      metrics_namespace:
        description: CloudWatch metrics namespace for EMF
        required: false
        default: Workshop/OrderProcessing
        type: string
      otel_mode:
        description: "Who initializes OpenTelemetry in Lambda: app code or ADOT layer"
        required: false
        default: code
        type: choice
        options:
          - code
          - adot_layer
      adot_lambda_layer_arn:
        description: Optional ADOT Lambda layer ARN. Leave empty to infer by AWS region when using adot_layer
        required: false
        default: ""
        type: string
      otel_exporter_otlp_endpoint:
        description: "Optional direct OTLP base endpoint for non-CloudWatch backends. For CloudWatch direct prefer per-signal endpoints or leave all direct endpoints empty with adot_layer"
        required: false
        default: ""
        type: string
      otel_export_strategy:
        description: "Where OTLP goes first: direct to the final backend or collector first"
        required: false
        default: direct
        type: choice
        options:
          - collector
          - direct
      otel_collector_endpoint:
        description: Collector OTLP base endpoint. Leave empty to let Terraform infer the Alloy endpoint when collector provisions the EC2 suite
        required: false
        default: ""
        type: string
      otel_collector_traces_endpoint:
        description: Optional collector traces endpoint override
        required: false
        default: ""
        type: string
      otel_collector_metrics_endpoint:
        description: Optional collector metrics endpoint override
        required: false
        default: ""
        type: string
      otel_exporter_otlp_traces_endpoint:
        description: "Optional direct traces OTLP endpoint. Leave empty to infer X-Ray when using adot_layer + direct"
        required: false
        default: ""
        type: string
      otel_exporter_otlp_metrics_endpoint:
        description: "Optional direct metrics OTLP endpoint. Leave empty to infer CloudWatch Metrics when using adot_layer + direct"
        required: false
        default: ""
        type: string
      observability_emf_compatibility_mode:
        description: Keep EMF metrics in parallel during migration
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      create_observability_dashboard:
        description: Create CloudWatch dashboard
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      create_observability_alarms:
        description: Create CloudWatch alarms
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      observability_suite_instance_type:
        description: EC2 instance type for the observability suite
        required: false
        default: t3.small
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      ENVIRONMENT_NAME: aws-dev
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'observability-business-case' }}
      RESOURCE_PREFIX: ${{ vars.RESOURCE_PREFIX != '' && vars.RESOURCE_PREFIX || 'aws-dev' }}
      PAYMENT_FAILURE_MODE: ${{ inputs.payment_failure_mode != '' && inputs.payment_failure_mode || vars.PAYMENT_FAILURE_MODE || 'random_fail' }}
      LOG_RETENTION_IN_DAYS: ${{ inputs.log_retention_in_days != '' && inputs.log_retention_in_days || vars.LOG_RETENTION_IN_DAYS || '7' }}
      METRICS_NAMESPACE: ${{ inputs.metrics_namespace != '' && inputs.metrics_namespace || vars.METRICS_NAMESPACE || 'Workshop/OrderProcessing' }}
      OTEL_MODE: ${{ inputs.otel_mode != '' && inputs.otel_mode || vars.OTEL_MODE || 'code' }}
      OTEL_EXPORT_STRATEGY: ${{ inputs.otel_export_strategy != '' && inputs.otel_export_strategy || vars.OTEL_EXPORT_STRATEGY || 'direct' }}
      OTEL_COLLECTOR_ENDPOINT: ${{ inputs.otel_collector_endpoint != '' && inputs.otel_collector_endpoint || vars.OTEL_COLLECTOR_ENDPOINT || '' }}
      OTEL_COLLECTOR_TRACES_ENDPOINT: ${{ inputs.otel_collector_traces_endpoint != '' && inputs.otel_collector_traces_endpoint || vars.OTEL_COLLECTOR_TRACES_ENDPOINT || '' }}
      OTEL_COLLECTOR_METRICS_ENDPOINT: ${{ inputs.otel_collector_metrics_endpoint != '' && inputs.otel_collector_metrics_endpoint || vars.OTEL_COLLECTOR_METRICS_ENDPOINT || '' }}
      ADOT_LAMBDA_LAYER_ARN: ${{ inputs.adot_lambda_layer_arn != '' && inputs.adot_lambda_layer_arn || vars.ADOT_LAMBDA_LAYER_ARN || '' }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ inputs.otel_exporter_otlp_endpoint != '' && inputs.otel_exporter_otlp_endpoint || vars.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ inputs.otel_exporter_otlp_traces_endpoint != '' && inputs.otel_exporter_otlp_traces_endpoint || vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || '' }}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${{ inputs.otel_exporter_otlp_metrics_endpoint != '' && inputs.otel_exporter_otlp_metrics_endpoint || vars.OTEL_EXPORTER_OTLP_METRICS_ENDPOINT || '' }}
      OTEL_METRIC_EXPORT_INTERVAL_MS: ${{ vars.OTEL_METRIC_EXPORT_INTERVAL_MS != '' && vars.OTEL_METRIC_EXPORT_INTERVAL_MS || '10000' }}
      OBSERVABILITY_EMF_COMPATIBILITY_MODE: ${{ inputs.observability_emf_compatibility_mode != '' && inputs.observability_emf_compatibility_mode || vars.OBSERVABILITY_EMF_COMPATIBILITY_MODE || 'true' }}
      CREATE_OBSERVABILITY_DASHBOARD: ${{ inputs.create_observability_dashboard != '' && inputs.create_observability_dashboard || vars.CREATE_OBSERVABILITY_DASHBOARD || 'true' }}
      CREATE_OBSERVABILITY_ALARMS: ${{ inputs.create_observability_alarms != '' && inputs.create_observability_alarms || vars.CREATE_OBSERVABILITY_ALARMS || 'true' }}
      OBSERVABILITY_SUITE_INSTANCE_TYPE: ${{ inputs.observability_suite_instance_type != '' && inputs.observability_suite_instance_type || vars.OBSERVABILITY_SUITE_INSTANCE_TYPE || 't3.small' }}
      OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB: ${{ vars.OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB != '' && vars.OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB || '20' }}
      API_5XX_ALARM_THRESHOLD: ${{ vars.API_5XX_ALARM_THRESHOLD != '' && vars.API_5XX_ALARM_THRESHOLD || '1' }}
      ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD: ${{ vars.ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD != '' && vars.ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD || '1' }}
      PAYMENT_LATENCY_ALARM_THRESHOLD_MS: ${{ vars.PAYMENT_LATENCY_ALARM_THRESHOLD_MS != '' && vars.PAYMENT_LATENCY_ALARM_THRESHOLD_MS || '3000' }}
      OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS: ${{ vars.OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS != '' && vars.OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS || '["0.0.0.0/0"]' }}
      OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS: ${{ vars.OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS != '' && vars.OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS || '["0.0.0.0/0"]' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Ensure Terraform state bucket
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          PROJECT_SLUG="$(printf '%s' "$EFFECTIVE_STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          PROJECT_SLUG="${PROJECT_SLUG#-}"
          PROJECT_SLUG="${PROJECT_SLUG%-}"

          if [ -n "$TF_STATE_BUCKET" ]; then
            BUCKET_NAME="$TF_STATE_BUCKET"
          else
            BUCKET_SUFFIX="${ACCOUNT_ID}-${AWS_REGION}-tfstate"
            MAX_BUCKET_LENGTH=63
            MAX_PROJECT_SLUG_LENGTH=$((MAX_BUCKET_LENGTH - ${#BUCKET_SUFFIX} - 1))
            PROJECT_HASH="$(printf '%s' "$PROJECT_SLUG" | shasum -a 256 | cut -c1-8)"

            if [ "$MAX_PROJECT_SLUG_LENGTH" -lt 10 ]; then
              echo "Unable to derive a valid Terraform state bucket name from STACK_NAME/RESOURCE_PREFIX." >&2
              exit 1
            fi

            if [ "${#PROJECT_SLUG}" -gt "$MAX_PROJECT_SLUG_LENGTH" ]; then
              TRUNCATED_LENGTH=$((MAX_PROJECT_SLUG_LENGTH - 9))
              PROJECT_SLUG="${PROJECT_SLUG:0:$TRUNCATED_LENGTH}-${PROJECT_HASH}"
              PROJECT_SLUG="${PROJECT_SLUG%-}"
            fi

            BUCKET_NAME="${PROJECT_SLUG}-${BUCKET_SUFFIX}"
          fi

          STATE_KEY="${TF_STATE_KEY:-${ENVIRONMENT_NAME}/${STACK_NAME}.tfstate}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Using existing Terraform state bucket: $BUCKET_NAME"
          else
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          {
            echo "TF_STATE_BUCKET=$BUCKET_NAME"
            echo "TF_STATE_KEY=$STATE_KEY"
          } >> "$GITHUB_ENV"

      - name: Initialize Terraform
        run: |
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Resolve effective ADOT layer ARN
        run: |
          EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="$ADOT_LAMBDA_LAYER_ARN"

          if [ "$OTEL_MODE" = "adot_layer" ] && [ -z "$EFFECTIVE_ADOT_LAMBDA_LAYER_ARN" ]; then
            case "$AWS_REGION" in
              ap-northeast-1|ap-northeast-2|ap-south-1|ap-southeast-1|ap-southeast-2|ca-central-1|eu-central-1|eu-north-1|eu-west-1|eu-west-2|eu-west-3|sa-east-1|us-east-1|us-east-2|us-west-1|us-west-2)
                EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="arn:aws:lambda:${AWS_REGION}:901920570463:layer:aws-otel-nodejs-amd64-ver-1-30-2:1"
                ;;
            esac
          fi

          echo "EFFECTIVE_ADOT_LAMBDA_LAYER_ARN=${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}" >> "$GITHUB_ENV"

      - name: Validate observability configuration
        run: |
          is_cloudwatch_traces_endpoint() {
            case "$1" in
              https://xray.*.amazonaws.com/v1/traces) return 0 ;;
              *) return 1 ;;
            esac
          }

          is_cloudwatch_metrics_endpoint() {
            case "$1" in
              https://monitoring.*.amazonaws.com/v1/metrics) return 0 ;;
              *) return 1 ;;
            esac
          }

          if [ "$OTEL_MODE" = "adot_layer" ] && [ -z "$EFFECTIVE_ADOT_LAMBDA_LAYER_ARN" ]; then
            echo "Unable to infer an ADOT Lambda layer ARN for region ${AWS_REGION}. Set ADOT_LAMBDA_LAYER_ARN explicitly." >&2
            exit 1
          fi

          if [ "$OTEL_MODE" = "adot_layer" ]; then
            echo "Using ADOT Node.js Lambda layer with AWS_LAMBDA_EXEC_WRAPPER=/opt/otel-handler and CloudWatchLambdaApplicationSignalsExecutionRolePolicy attached by Terraform."
          fi

          if [ "$OTEL_EXPORT_STRATEGY" = "collector" ] && [ -z "$OTEL_COLLECTOR_ENDPOINT" ] && [ -z "$OTEL_COLLECTOR_TRACES_ENDPOINT" ] && [ -z "$OTEL_COLLECTOR_METRICS_ENDPOINT" ]; then
            echo "Collector strategy selected. Terraform will provision the EC2 observability suite and infer the Alloy OTLP HTTP endpoint for traces and metrics unless explicit collector endpoints are provided."
          fi

          if [ "$OTEL_EXPORT_STRATEGY" = "direct" ] && [ -z "$OTEL_EXPORTER_OTLP_ENDPOINT" ] && [ -z "$OTEL_EXPORTER_OTLP_TRACES_ENDPOINT" ] && [ -z "$OTEL_EXPORTER_OTLP_METRICS_ENDPOINT" ]; then
            if [ "$OTEL_MODE" = "adot_layer" ]; then
              echo "Direct OTLP endpoints left empty with adot_layer. Terraform will infer CloudWatch OTLP traces and metrics endpoints for region ${AWS_REGION}."
            else
              echo "No OTLP endpoint configured. The stack will still emit EMF/X-Ray signals, but OTel export will remain inactive."
            fi
          fi

          if [ "$OTEL_MODE" = "code" ] && [ "$OTEL_EXPORT_STRATEGY" = "direct" ]; then
            if is_cloudwatch_traces_endpoint "$OTEL_EXPORTER_OTLP_ENDPOINT" || \
               is_cloudwatch_metrics_endpoint "$OTEL_EXPORTER_OTLP_ENDPOINT" || \
               is_cloudwatch_traces_endpoint "$OTEL_EXPORTER_OTLP_TRACES_ENDPOINT" || \
               is_cloudwatch_metrics_endpoint "$OTEL_EXPORTER_OTLP_METRICS_ENDPOINT"; then
              echo "CloudWatch direct OTLP endpoints require SigV4-capable ADOT runtime support. Use otel_mode=adot_layer for CloudWatch direct OTLP in this repo." >&2
              exit 1
            fi
          fi

      - name: Reconcile Terraform state
        run: |
          tf_has_state() {
            terraform -chdir=infra/terraform state show "$1" >/dev/null 2>&1
          }

          tf_import_if_missing() {
            ADDRESS="$1"
            IMPORT_ID="$2"

            if tf_has_state "$ADDRESS"; then
              echo "State already contains $ADDRESS"
              return 0
            fi

            echo "Importing $ADDRESS from $IMPORT_ID"
            terraform -chdir=infra/terraform import "$ADDRESS" "$IMPORT_ID"
          }

          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          CREATE_ORDER_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-create-order"
          GET_ORDER_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-get-order"
          PAYMENT_SIMULATOR_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-payment-simulator"
          ORDER_PROCESSOR_FUNCTION_NAME="${EFFECTIVE_STACK_NAME}-order-processor"
          API_NAME="${EFFECTIVE_STACK_NAME}-http-api"
          EVENT_RULE_NAME="${EFFECTIVE_STACK_NAME}-order-created"
          DASHBOARD_NAME="${EFFECTIVE_STACK_NAME}-observability"
          API_5XX_ALARM_NAME="${EFFECTIVE_STACK_NAME}-api-5xx"
          ORDER_PROCESSOR_ERRORS_ALARM_NAME="${EFFECTIVE_STACK_NAME}-order-processor-errors"
          PAYMENT_LATENCY_ALARM_NAME="${EFFECTIVE_STACK_NAME}-payment-latency"
          API_ACCESS_LOG_GROUP_NAME="/aws/apigateway/${EFFECTIVE_STACK_NAME}-http-api-access"
          CREATE_ORDER_LOG_GROUP_NAME="/aws/lambda/${CREATE_ORDER_FUNCTION_NAME}"
          GET_ORDER_LOG_GROUP_NAME="/aws/lambda/${GET_ORDER_FUNCTION_NAME}"
          PAYMENT_SIMULATOR_LOG_GROUP_NAME="/aws/lambda/${PAYMENT_SIMULATOR_FUNCTION_NAME}"
          ORDER_PROCESSOR_LOG_GROUP_NAME="/aws/lambda/${ORDER_PROCESSOR_FUNCTION_NAME}"

          for ITEM in \
            "aws_lambda_function.create_order:${CREATE_ORDER_FUNCTION_NAME}" \
            "aws_lambda_function.get_order:${GET_ORDER_FUNCTION_NAME}" \
            "aws_lambda_function.payment_simulator:${PAYMENT_SIMULATOR_FUNCTION_NAME}" \
            "aws_lambda_function.order_processor:${ORDER_PROCESSOR_FUNCTION_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            FUNCTION_NAME="${ITEM#*:}"

            if aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>&1; then
              tf_import_if_missing "$ADDRESS" "$FUNCTION_NAME"
            fi
          done

          for ITEM in \
            "aws_cloudwatch_log_group.api_access:${API_ACCESS_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.create_order:${CREATE_ORDER_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.get_order:${GET_ORDER_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.payment_simulator:${PAYMENT_SIMULATOR_LOG_GROUP_NAME}" \
            "aws_cloudwatch_log_group.order_processor:${ORDER_PROCESSOR_LOG_GROUP_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            LOG_GROUP_NAME="${ITEM#*:}"

            if aws logs describe-log-groups --log-group-name-prefix "$LOG_GROUP_NAME" --query "logGroups[?logGroupName=='${LOG_GROUP_NAME}'].logGroupName | [0]" --output text 2>/dev/null | grep -q "$LOG_GROUP_NAME"; then
              tf_import_if_missing "$ADDRESS" "$LOG_GROUP_NAME"
            fi
          done

          if aws cloudwatch get-dashboard --dashboard-name "$DASHBOARD_NAME" >/dev/null 2>&1; then
            tf_import_if_missing "aws_cloudwatch_dashboard.observability[0]" "$DASHBOARD_NAME"
          fi

          for ITEM in \
            "aws_cloudwatch_metric_alarm.api_5xx[0]:${API_5XX_ALARM_NAME}" \
            "aws_cloudwatch_metric_alarm.order_processor_errors[0]:${ORDER_PROCESSOR_ERRORS_ALARM_NAME}" \
            "aws_cloudwatch_metric_alarm.payment_latency[0]:${PAYMENT_LATENCY_ALARM_NAME}"
          do
            ADDRESS="${ITEM%%:*}"
            ALARM_NAME="${ITEM#*:}"

            if aws cloudwatch describe-alarms --alarm-names "$ALARM_NAME" --query "MetricAlarms[0].AlarmName" --output text 2>/dev/null | grep -q "$ALARM_NAME"; then
              tf_import_if_missing "$ADDRESS" "$ALARM_NAME"
            fi
          done

          API_ID="$(aws apigatewayv2 get-apis --query "Items[?Name=='${API_NAME}'].ApiId | [0]" --output text)"

          if [ "$API_ID" != "None" ] && [ -n "$API_ID" ]; then
            CREATE_ORDER_ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteKey=='POST /orders'].RouteId | [0]" --output text)"
            GET_ORDER_ROUTE_ID="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteKey=='GET /orders/{orderId}'].RouteId | [0]" --output text)"

            if [ "$CREATE_ORDER_ROUTE_ID" != "None" ] && [ -n "$CREATE_ORDER_ROUTE_ID" ]; then
              tf_import_if_missing "aws_apigatewayv2_route.create_order" "${API_ID}/${CREATE_ORDER_ROUTE_ID}"
              CREATE_ORDER_TARGET="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteId=='${CREATE_ORDER_ROUTE_ID}'].Target | [0]" --output text)"
              CREATE_ORDER_INTEGRATION_ID="${CREATE_ORDER_TARGET#integrations/}"

              if [ -n "$CREATE_ORDER_INTEGRATION_ID" ] && [ "$CREATE_ORDER_INTEGRATION_ID" != "$CREATE_ORDER_TARGET" ]; then
                tf_import_if_missing "aws_apigatewayv2_integration.create_order" "${API_ID}/${CREATE_ORDER_INTEGRATION_ID}"
              fi
            fi

            if [ "$GET_ORDER_ROUTE_ID" != "None" ] && [ -n "$GET_ORDER_ROUTE_ID" ]; then
              tf_import_if_missing "aws_apigatewayv2_route.get_order" "${API_ID}/${GET_ORDER_ROUTE_ID}"
              GET_ORDER_TARGET="$(aws apigatewayv2 get-routes --api-id "$API_ID" --query "Items[?RouteId=='${GET_ORDER_ROUTE_ID}'].Target | [0]" --output text)"
              GET_ORDER_INTEGRATION_ID="${GET_ORDER_TARGET#integrations/}"

              if [ -n "$GET_ORDER_INTEGRATION_ID" ] && [ "$GET_ORDER_INTEGRATION_ID" != "$GET_ORDER_TARGET" ]; then
                tf_import_if_missing "aws_apigatewayv2_integration.get_order" "${API_ID}/${GET_ORDER_INTEGRATION_ID}"
              fi
            fi
          fi

          if aws lambda get-policy --function-name "$CREATE_ORDER_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowHttpApiInvokeCreateOrder'; then
            tf_import_if_missing "aws_lambda_permission.allow_api_gateway_create_order" "${CREATE_ORDER_FUNCTION_NAME}/AllowHttpApiInvokeCreateOrder"
          fi

          if aws lambda get-policy --function-name "$GET_ORDER_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowHttpApiInvokeGetOrder'; then
            tf_import_if_missing "aws_lambda_permission.allow_api_gateway_get_order" "${GET_ORDER_FUNCTION_NAME}/AllowHttpApiInvokeGetOrder"
          fi

          if aws lambda get-policy --function-name "$ORDER_PROCESSOR_FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null | grep -q 'AllowEventBridgeInvokeOrderProcessor'; then
            tf_import_if_missing "aws_lambda_permission.allow_eventbridge_order_processor" "${ORDER_PROCESSOR_FUNCTION_NAME}/AllowEventBridgeInvokeOrderProcessor"
          fi

          if aws events list-targets-by-rule --rule "$EVENT_RULE_NAME" --query "Targets[?Id=='OrderProcessorFunction'].Id | [0]" --output text 2>/dev/null | grep -q 'OrderProcessorFunction'; then
            tf_import_if_missing "aws_cloudwatch_event_target.order_processor" "${EVENT_RULE_NAME}/OrderProcessorFunction"
          fi

      - name: Deploy stack
        run: |
          terraform -chdir=infra/terraform apply \
            -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="resource_prefix=${RESOURCE_PREFIX}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}" \
            -var="log_retention_in_days=${LOG_RETENTION_IN_DAYS}" \
            -var="metrics_namespace=${METRICS_NAMESPACE}" \
            -var="otel_mode=${OTEL_MODE}" \
            -var="otel_export_strategy=${OTEL_EXPORT_STRATEGY}" \
            -var="otel_collector_endpoint=${OTEL_COLLECTOR_ENDPOINT}" \
            -var="otel_collector_traces_endpoint=${OTEL_COLLECTOR_TRACES_ENDPOINT}" \
            -var="otel_collector_metrics_endpoint=${OTEL_COLLECTOR_METRICS_ENDPOINT}" \
            -var="adot_lambda_layer_arn=${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}" \
            -var="otel_exporter_otlp_endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}" \
            -var="otel_exporter_otlp_traces_endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}" \
            -var="otel_exporter_otlp_metrics_endpoint=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}" \
            -var="otel_metric_export_interval_ms=${OTEL_METRIC_EXPORT_INTERVAL_MS}" \
            -var="observability_emf_compatibility_mode=${OBSERVABILITY_EMF_COMPATIBILITY_MODE}" \
            -var="create_observability_dashboard=${CREATE_OBSERVABILITY_DASHBOARD}" \
            -var="create_observability_alarms=${CREATE_OBSERVABILITY_ALARMS}" \
            -var="observability_suite_instance_type=${OBSERVABILITY_SUITE_INSTANCE_TYPE}" \
            -var="observability_suite_root_volume_size_gb=${OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB}" \
            -var="observability_suite_grafana_allowed_cidrs=${OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS}" \
            -var="observability_suite_otlp_allowed_cidrs=${OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS}" \
            -var="api_5xx_alarm_threshold=${API_5XX_ALARM_THRESHOLD}" \
            -var="order_processor_error_alarm_threshold=${ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD}" \
            -var="payment_latency_alarm_threshold_ms=${PAYMENT_LATENCY_ALARM_THRESHOLD_MS}"

      - name: Build deployment profile artifact
        run: |
          mkdir -p build/artifacts

          API_BASE_URL="$(terraform -chdir=infra/terraform output -raw api_base_url)"
          ORDERS_TABLE_NAME="$(terraform -chdir=infra/terraform output -raw orders_table_name)"
          PAYMENT_SIMULATOR_NAME="$(terraform -chdir=infra/terraform output -raw payment_simulator_name)"
          API_ACCESS_LOG_GROUP_NAME="$(terraform -chdir=infra/terraform output -raw api_access_log_group_name)"
          OBSERVABILITY_DASHBOARD_NAME="$(terraform -chdir=infra/terraform output -raw observability_dashboard_name || true)"
          EFFECTIVE_OTLP_BASE_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_base_endpoint || true)"
          EFFECTIVE_OTLP_TRACES_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_traces_endpoint || true)"
          EFFECTIVE_OTLP_METRICS_ENDPOINT="$(terraform -chdir=infra/terraform output -raw effective_otlp_metrics_endpoint || true)"
          EFFECTIVE_OTLP_AUTHENTICATION_MODE="$(terraform -chdir=infra/terraform output -raw effective_otlp_authentication_mode || true)"
          EFFECTIVE_LAMBDA_EXEC_WRAPPER="$(terraform -chdir=infra/terraform output -raw effective_lambda_exec_wrapper || true)"
          APPLICATION_SIGNALS_EXECUTION_ROLE_POLICY_ENABLED="$(terraform -chdir=infra/terraform output -raw application_signals_execution_role_policy_enabled || true)"
          EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="$(terraform -chdir=infra/terraform output -raw effective_adot_lambda_layer_arn || true)"
          OTLP_EXPORT_STATUS="$(terraform -chdir=infra/terraform output -raw otlp_export_status || true)"
          OBSERVABILITY_SUITE_ENABLED="$(terraform -chdir=infra/terraform output -raw observability_suite_enabled || true)"
          OBSERVABILITY_SUITE_PUBLIC_IP="$(terraform -chdir=infra/terraform output -raw observability_suite_public_ip || true)"
          OBSERVABILITY_SUITE_GRAFANA_URL="$(terraform -chdir=infra/terraform output -raw observability_suite_grafana_url || true)"
          OBSERVABILITY_SUITE_GRAFANA_DASHBOARD_URL="$(terraform -chdir=infra/terraform output -raw observability_suite_grafana_dashboard_url || true)"
          OBSERVABILITY_SUITE_OTLP_HTTP_ENDPOINT="$(terraform -chdir=infra/terraform output -raw observability_suite_otlp_http_endpoint || true)"
          OBSERVABILITY_SUITE_OTLP_GRPC_ENDPOINT="$(terraform -chdir=infra/terraform output -raw observability_suite_otlp_grpc_endpoint || true)"

          if [ "$OTEL_MODE" = "adot_layer" ]; then
            OTEL_INITIALIZATION="ADOT Lambda Layer"
          else
            OTEL_INITIALIZATION="In-process code bootstrap"
          fi

          if [ "$OTEL_EXPORT_STRATEGY" = "collector" ]; then
            OTEL_EXPORT_ROUTE="Collector first"
          else
            OTEL_EXPORT_ROUTE="Direct OTLP"
          fi

          if [ "$OTLP_EXPORT_STATUS" = "active" ]; then
            OTLP_EXPORT_STATUS_LABEL="Active"
          else
            OTLP_EXPORT_STATUS_LABEL="Inactive"
          fi

          if [ "$OBSERVABILITY_EMF_COMPATIBILITY_MODE" = "true" ]; then
            EMF_STATUS="Active"
          else
            EMF_STATUS="Inactive"
          fi

          cat > build/artifacts/deployment-profile.md <<EOF
          # Deployment Profile

          Generated by \`.github/workflows/deploy.yml\` for run \`${GITHUB_RUN_ID}\`.

          ## Deployment Context

          | Field | Value |
          | :--- | :--- |
          | Environment | \`${ENVIRONMENT_NAME}\` |
          | AWS Region | \`${AWS_REGION}\` |
          | Stack Name | \`${STACK_NAME}\` |
          | Resource Prefix | \`${RESOURCE_PREFIX}\` |
          | Git Branch | \`${GITHUB_REF_NAME}\` |
          | Git Commit | \`${GITHUB_SHA}\` |
          | API Base URL | \`${API_BASE_URL}\` |
          | Orders Table | \`${ORDERS_TABLE_NAME}\` |
          | Payment Simulator Lambda | \`${PAYMENT_SIMULATOR_NAME}\` |
          | API Access Log Group | \`${API_ACCESS_LOG_GROUP_NAME}\` |
          | CloudWatch Dashboard | \`${OBSERVABILITY_DASHBOARD_NAME}\` |
          | Collector-managed suite active | \`${OBSERVABILITY_SUITE_ENABLED}\` |
          | Observability Suite Public IP | \`${OBSERVABILITY_SUITE_PUBLIC_IP}\` |
          | Grafana URL | \`${OBSERVABILITY_SUITE_GRAFANA_URL}\` |
          | Grafana Dashboard URL | \`${OBSERVABILITY_SUITE_GRAFANA_DASHBOARD_URL}\` |

          ## Effective Observability Configuration

          | Setting | Effective Value |
          | :--- | :--- |
          | OTEL_MODE | \`${OTEL_MODE}\` |
          | OTel initialization owner | ${OTEL_INITIALIZATION} |
          | OTEL_EXPORT_STRATEGY | \`${OTEL_EXPORT_STRATEGY}\` |
          | OTel export route | ${OTEL_EXPORT_ROUTE} |
          | OTLP export status | ${OTLP_EXPORT_STATUS_LABEL} |
          | OTLP backend auth requirement | \`${EFFECTIVE_OTLP_AUTHENTICATION_MODE}\` |
          | AWS_LAMBDA_EXEC_WRAPPER | \`${EFFECTIVE_LAMBDA_EXEC_WRAPPER}\` |
          | Application Signals execution role policy | \`${APPLICATION_SIGNALS_EXECUTION_ROLE_POLICY_ENABLED}\` |
          | EMF compatibility mode | ${EMF_STATUS} |
          | Requested ADOT Lambda Layer ARN | \`${ADOT_LAMBDA_LAYER_ARN}\` |
          | Effective ADOT Lambda Layer ARN | \`${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}\` |
          | Effective OTLP base endpoint | \`${EFFECTIVE_OTLP_BASE_ENDPOINT}\` |
          | Effective OTLP traces endpoint | \`${EFFECTIVE_OTLP_TRACES_ENDPOINT}\` |
          | Effective OTLP metrics endpoint | \`${EFFECTIVE_OTLP_METRICS_ENDPOINT}\` |
          | Alloy OTLP HTTP endpoint | \`${OBSERVABILITY_SUITE_OTLP_HTTP_ENDPOINT}\` |
          | Alloy OTLP gRPC endpoint | \`${OBSERVABILITY_SUITE_OTLP_GRPC_ENDPOINT}\` |
          | Metrics namespace | \`${METRICS_NAMESPACE}\` |
          | OTel metric export interval ms | \`${OTEL_METRIC_EXPORT_INTERVAL_MS}\` |

          ## Effective Signals

          | Signal | Effective mechanism |
          | :--- | :--- |
          | Logs | CloudWatch Logs |
          | API edge telemetry | API Gateway access logs + native metrics |
          | Business metrics | EMF to CloudWatch Metrics when compatibility mode is active |
          | Lambda traces | X-Ray |
          | OTLP traces | ${OTLP_EXPORT_STATUS_LABEL} |
          | OTLP metrics | ${OTLP_EXPORT_STATUS_LABEL} |

          ## Collected Business Metrics

          | Metric | Service | Meaning |
          | :--- | :--- | :--- |
          | \`OrdersCreated\` | \`order-api\` | Successful order creations |
          | \`CreateOrderLatencyMs\` | \`order-api\` | Latency of \`POST /orders\` |
          | \`CreateOrderErrors\` | \`order-api\` | Create-order failures |
          | \`OrdersRead\` | \`order-api\` | Successful order reads |
          | \`OrdersNotFound\` | \`order-api\` | Missing-order lookups |
          | \`GetOrderErrors\` | \`order-api\` | Get-order failures |
          | \`OrdersProcessed\` | \`order-processor\` | Processed order events |
          | \`PaymentInvocationLatencyMs\` | \`order-processor\` | Payment invocation latency |
          | \`OrderProcessorIgnoredEvents\` | \`order-processor\` | Ignored events |
          | \`OrderProcessorDuplicateEvents\` | \`order-processor\` | Duplicate or already processed events |
          | \`OrderProcessorErrors\` | \`order-processor\` | Order-processor failures |
          | \`PaymentsSimulated\` | \`payment-simulator\` | Simulated payments |
          | \`PaymentSimulationLatencyMs\` | \`payment-simulator\` | Payment simulation latency |
          | \`PaymentSimulationErrors\` | \`payment-simulator\` | Payment simulation failures |

          ## Alarm And Dashboard Settings

          | Setting | Value |
          | :--- | :--- |
          | CREATE_OBSERVABILITY_DASHBOARD | \`${CREATE_OBSERVABILITY_DASHBOARD}\` |
          | CREATE_OBSERVABILITY_ALARMS | \`${CREATE_OBSERVABILITY_ALARMS}\` |
          | API_5XX_ALARM_THRESHOLD | \`${API_5XX_ALARM_THRESHOLD}\` |
          | ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD | \`${ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD}\` |
          | PAYMENT_LATENCY_ALARM_THRESHOLD_MS | \`${PAYMENT_LATENCY_ALARM_THRESHOLD_MS}\` |

          ## Interpretation

          - If \`OTEL_MODE=code\`, the application initializes OpenTelemetry from \`src/shared/otel-bootstrap.js\`.
          - If \`OTEL_MODE=adot_layer\`, the Lambda Layer is responsible for SDK bootstrap and this repo configures \`AWS_LAMBDA_EXEC_WRAPPER=/opt/otel-handler\` for the AWS-managed Node.js layer in use.
          - If \`OTEL_EXPORT_STRATEGY=direct\`, Lambdas export OTLP directly to the final backend.
          - If \`OTEL_EXPORT_STRATEGY=collector\`, Lambdas export OTLP to Alloy first and Terraform provisions the EC2 suite for the workshop.
          - If \`OTEL_MODE=adot_layer\` and all direct OTLP inputs are empty, Terraform infers CloudWatch OTLP traces and metrics endpoints for the selected region.
          - If \`OTEL_EXPORT_STRATEGY=collector\` and no collector endpoint override is provided, Terraform infers the Alloy OTLP HTTP endpoint for both traces and metrics.
          - If \`Application Signals execution role policy=true\`, Terraform attached \`CloudWatchLambdaApplicationSignalsExecutionRolePolicy\` to all Lambda execution roles.
          - If \`effective_otlp_authentication_mode=sigv4\`, the selected OTLP backend requires SigV4 and this repo relies on the AWS-managed ADOT Lambda layer to satisfy that requirement at runtime.
          - If all effective OTLP endpoints are empty, OTLP export is inactive and CloudWatch Logs / EMF / X-Ray remain the effective active path.
          EOF

          cat > build/artifacts/deployment-profile.json <<EOF
          {
            "environment": "${ENVIRONMENT_NAME}",
            "aws_region": "${AWS_REGION}",
            "stack_name": "${STACK_NAME}",
            "resource_prefix": "${RESOURCE_PREFIX}",
            "git_branch": "${GITHUB_REF_NAME}",
            "git_commit": "${GITHUB_SHA}",
            "api_base_url": "${API_BASE_URL}",
            "orders_table_name": "${ORDERS_TABLE_NAME}",
            "payment_simulator_name": "${PAYMENT_SIMULATOR_NAME}",
            "api_access_log_group_name": "${API_ACCESS_LOG_GROUP_NAME}",
            "observability_dashboard_name": "${OBSERVABILITY_DASHBOARD_NAME}",
            "observability_suite_enabled": "${OBSERVABILITY_SUITE_ENABLED}",
            "observability_suite_public_ip": "${OBSERVABILITY_SUITE_PUBLIC_IP}",
            "observability_suite_grafana_url": "${OBSERVABILITY_SUITE_GRAFANA_URL}",
            "observability_suite_grafana_dashboard_url": "${OBSERVABILITY_SUITE_GRAFANA_DASHBOARD_URL}",
            "otel_mode": "${OTEL_MODE}",
            "otel_export_strategy": "${OTEL_EXPORT_STRATEGY}",
            "otel_initialization_owner": "${OTEL_INITIALIZATION}",
            "otel_export_route": "${OTEL_EXPORT_ROUTE}",
            "otlp_export_status": "${OTLP_EXPORT_STATUS}",
            "effective_otlp_authentication_mode": "${EFFECTIVE_OTLP_AUTHENTICATION_MODE}",
            "effective_lambda_exec_wrapper": "${EFFECTIVE_LAMBDA_EXEC_WRAPPER}",
            "application_signals_execution_role_policy_enabled": "${APPLICATION_SIGNALS_EXECUTION_ROLE_POLICY_ENABLED}",
            "observability_emf_compatibility_mode": "${OBSERVABILITY_EMF_COMPATIBILITY_MODE}",
            "requested_adot_lambda_layer_arn": "${ADOT_LAMBDA_LAYER_ARN}",
            "effective_adot_lambda_layer_arn": "${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}",
            "effective_otlp_base_endpoint": "${EFFECTIVE_OTLP_BASE_ENDPOINT}",
            "effective_otlp_traces_endpoint": "${EFFECTIVE_OTLP_TRACES_ENDPOINT}",
            "effective_otlp_metrics_endpoint": "${EFFECTIVE_OTLP_METRICS_ENDPOINT}",
            "observability_suite_otlp_http_endpoint": "${OBSERVABILITY_SUITE_OTLP_HTTP_ENDPOINT}",
            "observability_suite_otlp_grpc_endpoint": "${OBSERVABILITY_SUITE_OTLP_GRPC_ENDPOINT}",
            "metrics_namespace": "${METRICS_NAMESPACE}",
            "otel_metric_export_interval_ms": "${OTEL_METRIC_EXPORT_INTERVAL_MS}",
            "collected_business_metrics": [
              "OrdersCreated",
              "CreateOrderLatencyMs",
              "CreateOrderErrors",
              "OrdersRead",
              "OrdersNotFound",
              "GetOrderErrors",
              "OrdersProcessed",
              "PaymentInvocationLatencyMs",
              "OrderProcessorIgnoredEvents",
              "OrderProcessorDuplicateEvents",
              "OrderProcessorErrors",
              "PaymentsSimulated",
              "PaymentSimulationLatencyMs",
              "PaymentSimulationErrors"
            ],
            "create_observability_dashboard": "${CREATE_OBSERVABILITY_DASHBOARD}",
            "create_observability_alarms": "${CREATE_OBSERVABILITY_ALARMS}",
            "api_5xx_alarm_threshold": "${API_5XX_ALARM_THRESHOLD}",
            "order_processor_error_alarm_threshold": "${ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD}",
            "payment_latency_alarm_threshold_ms": "${PAYMENT_LATENCY_ALARM_THRESHOLD_MS}"
          }
          EOF

      - name: Upload deployment profile artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-profile-${{ env.ENVIRONMENT_NAME }}-${{ github.run_id }}
          path: build/artifacts/
          if-no-files-found: error

      - name: Show API URL
        run: terraform -chdir=infra/terraform output -raw api_base_url
