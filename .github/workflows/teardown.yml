name: Teardown

on:
  workflow_dispatch:
    inputs:
      resource_prefix:
        description: Environment/resource prefix used in names and state derivation
        required: false
        default: aws-dev-1
        type: string
      confirm_stack:
        description: Type the exact effective stack name to confirm teardown, including resource prefix when used
        required: true
        default: aws-dev-1-observability-business-case
        type: string

jobs:
  teardown:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      ENVIRONMENT_NAME: aws-dev
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'observability-business-case' }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix != '' && inputs.resource_prefix || vars.RESOURCE_PREFIX || 'aws-dev-1' }}
      PAYMENT_FAILURE_MODE: ${{ vars.PAYMENT_FAILURE_MODE != '' && vars.PAYMENT_FAILURE_MODE || 'random_fail' }}
      LOG_RETENTION_IN_DAYS: ${{ vars.LOG_RETENTION_IN_DAYS != '' && vars.LOG_RETENTION_IN_DAYS || '7' }}
      METRICS_NAMESPACE: ${{ vars.METRICS_NAMESPACE != '' && vars.METRICS_NAMESPACE || 'Workshop/OrderProcessing' }}
      OTEL_MODE: ${{ vars.OTEL_MODE != '' && vars.OTEL_MODE || 'code' }}
      OTEL_EXPORT_STRATEGY: ${{ vars.OTEL_EXPORT_STRATEGY != '' && vars.OTEL_EXPORT_STRATEGY || 'direct' }}
      OTEL_COLLECTOR_ENDPOINT: ${{ vars.OTEL_COLLECTOR_ENDPOINT != '' && vars.OTEL_COLLECTOR_ENDPOINT || '' }}
      OTEL_COLLECTOR_TRACES_ENDPOINT: ${{ vars.OTEL_COLLECTOR_TRACES_ENDPOINT != '' && vars.OTEL_COLLECTOR_TRACES_ENDPOINT || '' }}
      OTEL_COLLECTOR_METRICS_ENDPOINT: ${{ vars.OTEL_COLLECTOR_METRICS_ENDPOINT != '' && vars.OTEL_COLLECTOR_METRICS_ENDPOINT || '' }}
      ADOT_LAMBDA_LAYER_ARN: ${{ vars.ADOT_LAMBDA_LAYER_ARN != '' && vars.ADOT_LAMBDA_LAYER_ARN || '' }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT != '' && vars.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT != '' && vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || '' }}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_METRICS_ENDPOINT != '' && vars.OTEL_EXPORTER_OTLP_METRICS_ENDPOINT || '' }}
      OTEL_METRIC_EXPORT_INTERVAL_MS: ${{ vars.OTEL_METRIC_EXPORT_INTERVAL_MS != '' && vars.OTEL_METRIC_EXPORT_INTERVAL_MS || '10000' }}
      OBSERVABILITY_EMF_COMPATIBILITY_MODE: ${{ vars.OBSERVABILITY_EMF_COMPATIBILITY_MODE != '' && vars.OBSERVABILITY_EMF_COMPATIBILITY_MODE || 'true' }}
      CREATE_OBSERVABILITY_DASHBOARD: ${{ vars.CREATE_OBSERVABILITY_DASHBOARD != '' && vars.CREATE_OBSERVABILITY_DASHBOARD || 'true' }}
      CREATE_OBSERVABILITY_ALARMS: ${{ vars.CREATE_OBSERVABILITY_ALARMS != '' && vars.CREATE_OBSERVABILITY_ALARMS || 'true' }}
      OBSERVABILITY_SUITE_INSTANCE_TYPE: ${{ vars.OBSERVABILITY_SUITE_INSTANCE_TYPE != '' && vars.OBSERVABILITY_SUITE_INSTANCE_TYPE || 't3.small' }}
      OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD: ${{ secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD != '' && secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || vars.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || '' }}
      TF_VAR_observability_suite_grafana_admin_password: ${{ secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD != '' && secrets.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || vars.OBSERVABILITY_SUITE_GRAFANA_ADMIN_PASSWORD || '' }}
      OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB: ${{ vars.OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB != '' && vars.OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB || '20' }}
      OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS: ${{ vars.OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS != '' && vars.OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS || '["0.0.0.0/0"]' }}
      OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS: ${{ vars.OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS != '' && vars.OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS || '["0.0.0.0/0"]' }}
      API_5XX_ALARM_THRESHOLD: ${{ vars.API_5XX_ALARM_THRESHOLD != '' && vars.API_5XX_ALARM_THRESHOLD || '1' }}
      ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD: ${{ vars.ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD != '' && vars.ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD || '1' }}
      PAYMENT_LATENCY_ALARM_THRESHOLD_MS: ${{ vars.PAYMENT_LATENCY_ALARM_THRESHOLD_MS != '' && vars.PAYMENT_LATENCY_ALARM_THRESHOLD_MS || '3000' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

    steps:
      - name: Validate confirmation
        run: |
          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          if [ "${{ inputs.confirm_stack }}" != "$EFFECTIVE_STACK_NAME" ]; then
            echo "Confirmation mismatch. Expected '$EFFECTIVE_STACK_NAME'." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Prepare Lambda bundle
        run: bash scripts/prepare-lambda-package.sh

      - name: Resolve Terraform state backend
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          PROJECT_SLUG="$(printf '%s' "$EFFECTIVE_STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          PROJECT_SLUG="${PROJECT_SLUG#-}"
          PROJECT_SLUG="${PROJECT_SLUG%-}"

          if [ -n "$TF_STATE_BUCKET" ]; then
            BUCKET_NAME="$TF_STATE_BUCKET"
          else
            BUCKET_SUFFIX="${ACCOUNT_ID}-${AWS_REGION}-tfstate"
            MAX_BUCKET_LENGTH=63
            MAX_PROJECT_SLUG_LENGTH=$((MAX_BUCKET_LENGTH - ${#BUCKET_SUFFIX} - 1))
            PROJECT_HASH="$(printf '%s' "$PROJECT_SLUG" | shasum -a 256 | cut -c1-8)"

            if [ "$MAX_PROJECT_SLUG_LENGTH" -lt 10 ]; then
              echo "Unable to derive a valid Terraform state bucket name from STACK_NAME/RESOURCE_PREFIX." >&2
              exit 1
            fi

            if [ "${#PROJECT_SLUG}" -gt "$MAX_PROJECT_SLUG_LENGTH" ]; then
              TRUNCATED_LENGTH=$((MAX_PROJECT_SLUG_LENGTH - 9))
              PROJECT_SLUG="${PROJECT_SLUG:0:$TRUNCATED_LENGTH}-${PROJECT_HASH}"
              PROJECT_SLUG="${PROJECT_SLUG%-}"
            fi

            BUCKET_NAME="${PROJECT_SLUG}-${BUCKET_SUFFIX}"
          fi

          STATE_KEY="${TF_STATE_KEY:-${ENVIRONMENT_NAME}/${EFFECTIVE_STACK_NAME}.tfstate}"

          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Terraform state bucket '$BUCKET_NAME' does not exist or is not accessible." >&2
            exit 1
          fi

          {
            echo "TF_STATE_BUCKET=$BUCKET_NAME"
            echo "TF_STATE_KEY=$STATE_KEY"
          } >> "$GITHUB_ENV"

      - name: Initialize Terraform
        run: |
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Resolve effective ADOT layer ARN
        run: |
          EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="$ADOT_LAMBDA_LAYER_ARN"

          if [ "$OTEL_MODE" = "adot_layer" ] && [ -z "$EFFECTIVE_ADOT_LAMBDA_LAYER_ARN" ]; then
            case "$AWS_REGION" in
              ap-northeast-1|ap-northeast-2|ap-south-1|ap-southeast-1|ap-southeast-2|ca-central-1|eu-central-1|eu-north-1|eu-west-1|eu-west-2|eu-west-3|sa-east-1|us-east-1|us-east-2|us-west-1|us-west-2)
                EFFECTIVE_ADOT_LAMBDA_LAYER_ARN="arn:aws:lambda:${AWS_REGION}:901920570463:layer:aws-otel-nodejs-amd64-ver-1-30-2:1"
                ;;
            esac
          fi

          echo "EFFECTIVE_ADOT_LAMBDA_LAYER_ARN=${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}" >> "$GITHUB_ENV"

      - name: Destroy stack
        run: |
          terraform -chdir=infra/terraform destroy \
            -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="resource_prefix=${RESOURCE_PREFIX}" \
            -var="payment_failure_mode=${PAYMENT_FAILURE_MODE}" \
            -var="log_retention_in_days=${LOG_RETENTION_IN_DAYS}" \
            -var="metrics_namespace=${METRICS_NAMESPACE}" \
            -var="otel_mode=${OTEL_MODE}" \
            -var="otel_export_strategy=${OTEL_EXPORT_STRATEGY}" \
            -var="otel_collector_endpoint=${OTEL_COLLECTOR_ENDPOINT}" \
            -var="otel_collector_traces_endpoint=${OTEL_COLLECTOR_TRACES_ENDPOINT}" \
            -var="otel_collector_metrics_endpoint=${OTEL_COLLECTOR_METRICS_ENDPOINT}" \
            -var="adot_lambda_layer_arn=${EFFECTIVE_ADOT_LAMBDA_LAYER_ARN}" \
            -var="otel_exporter_otlp_endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}" \
            -var="otel_exporter_otlp_traces_endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}" \
            -var="otel_exporter_otlp_metrics_endpoint=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}" \
            -var="otel_metric_export_interval_ms=${OTEL_METRIC_EXPORT_INTERVAL_MS}" \
            -var="observability_emf_compatibility_mode=${OBSERVABILITY_EMF_COMPATIBILITY_MODE}" \
            -var="create_observability_dashboard=${CREATE_OBSERVABILITY_DASHBOARD}" \
            -var="create_observability_alarms=${CREATE_OBSERVABILITY_ALARMS}" \
            -var="observability_suite_instance_type=${OBSERVABILITY_SUITE_INSTANCE_TYPE}" \
            -var="observability_suite_root_volume_size_gb=${OBSERVABILITY_SUITE_ROOT_VOLUME_SIZE_GB}" \
            -var="observability_suite_grafana_allowed_cidrs=${OBSERVABILITY_SUITE_GRAFANA_ALLOWED_CIDRS}" \
            -var="observability_suite_otlp_allowed_cidrs=${OBSERVABILITY_SUITE_OTLP_ALLOWED_CIDRS}" \
            -var="api_5xx_alarm_threshold=${API_5XX_ALARM_THRESHOLD}" \
            -var="order_processor_error_alarm_threshold=${ORDER_PROCESSOR_ERROR_ALARM_THRESHOLD}" \
            -var="payment_latency_alarm_threshold_ms=${PAYMENT_LATENCY_ALARM_THRESHOLD_MS}"
