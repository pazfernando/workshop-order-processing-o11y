apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-processing
  owner: order-processing-team
  system: workshop-order-processing
  environment: dev
  labels:
    app.kubernetes.io/name: order-processing
    app.kubernetes.io/part-of: workshop-order-processing
    app.kubernetes.io/managed-by: idp
    platform.io/domain: commerce
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  service:
    name: order-processing
    runtime: aws-lambda
    language: nodejs
    framework: aws-serverless
    tier: "2"
    lifecycle: production
  delivery:
    mode: provision
    target: aws
    region: us-east-1
  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: opentelemetry
      propagators:
        - tracecontext
        - baggage
        - xray
    resourceAttributes:
      service.name: order-processing
      service.namespace: workshop-order-processing
      deployment.environment: dev
      cloud.provider: aws
    signals:
      traces:
        enabled: true
        ingestion: collector
        backendClass: traces-standard
      metrics:
        enabled: true
        ingestion: collector
        backendClass: metrics-standard
        catalog:
          - name: HttpServerRequestCount
            type: counter
            unit: "{request}"
            description: Total HTTP requests handled by the serverless API.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: HttpServerRequestDuration
            type: histogram
            unit: ms
            description: End-to-end HTTP request latency for the serverless API.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: HttpServerRequestErrors
            type: counter
            unit: "{error}"
            description: HTTP requests that completed with server-side failure conditions.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: AsyncOperationCount
            type: counter
            unit: "{operation}"
            description: Total async worker operations handled by the serverless workflow.
            dimensions: [app.operation, aws.lambda.function_name, faas.trigger]
          - name: AsyncOperationDuration
            type: histogram
            unit: ms
            description: End-to-end latency for async worker operations.
            dimensions: [app.operation, aws.lambda.function_name, faas.trigger]
          - name: AsyncOperationErrors
            type: counter
            unit: "{error}"
            description: Async worker operations that completed with failures.
            dimensions: [app.operation, aws.lambda.function_name, faas.trigger]
      logs:
        enabled: true
        ingestion: collector
        backendClass: logs-standard
        format: json
  capabilities:
    dashboards:
      enabled: true
      preset: serverless-api-async-workflow
    alerts:
      enabled: false
    slos:
      enabled: false
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 7
      dataClassification: internal
status:
  phase: Pending
  conditions:
    - type: Validated
      status: Unknown
