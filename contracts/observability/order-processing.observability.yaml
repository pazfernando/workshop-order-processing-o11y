apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-processing
  owner: order-processing-team
  system: workshop-order-processing
  environment: dev
  labels:
    app.kubernetes.io/name: order-processing
    app.kubernetes.io/part-of: workshop-order-processing
    app.kubernetes.io/managed-by: idp
    platform.io/domain: commerce
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  service:
    name: order-processing
    runtime: aws-lambda
    language: nodejs
    framework: aws-serverless
    tier: "2"
    lifecycle: production
  delivery:
    mode: provision
    target: aws
    region: us-east-1
  telemetry:
    signals:
      traces:
        enabled: false
      metrics:
        enabled: false
      logs:
        enabled: true
        format: json
  capabilities:
    dashboards:
      enabled: false
    alerts:
      enabled: false
    slos:
      enabled: false
    dataManagement:
      retention:
        logsDays: 7
      dataClassification: internal
status:
  phase: Pending
  conditions:
    - type: Validated
      status: Unknown
