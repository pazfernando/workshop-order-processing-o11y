apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-processing
  owner: order-processing-team
  system: workshop-order-processing
  environment: dev
  labels:
    app.kubernetes.io/name: order-processing
    app.kubernetes.io/part-of: workshop-order-processing
    app.kubernetes.io/managed-by: idp
    platform.io/domain: commerce
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  service:
    name: order-processing
    runtime: aws-lambda
    language: nodejs
    framework: aws-serverless
    tier: "2"
    lifecycle: production
  delivery:
    mode: provision
    target: aws
    region: us-east-1
  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: opentelemetry
      propagators:
        - tracecontext
        - baggage
        - xray
    resourceAttributes:
      service.name: order-processing
      service.namespace: workshop-order-processing
      deployment.environment: dev
      cloud.provider: aws
    signals:
      traces:
        enabled: true
        ingestion: collector
        backendClass: traces-standard
      metrics:
        enabled: true
        ingestion: collector
        backendClass: metrics-standard
        catalog:
          - name: OrdersCreated
            type: counter
            unit: "{order}"
            description: Successful order creations.
            dimensions: [service, operation]
          - name: CreateOrderLatencyMs
            type: histogram
            unit: ms
            description: Latency of POST /orders.
            dimensions: [service, operation]
      logs:
        enabled: true
        ingestion: collector
        backendClass: logs-standard
        format: json
  capabilities:
    dashboards:
      enabled: false
    alerts:
      enabled: false
    slos:
      enabled: false
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 7
      dataClassification: internal
status:
  phase: Pending
  conditions:
    - type: Validated
      status: Unknown
